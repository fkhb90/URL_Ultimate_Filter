name: SSOT Compiler Auto Build & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'SSOT_Compiler.py'

# 宣告 GITHUB_TOKEN 的權限，允許推播程式碼與發佈 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 確保同一時間只有一個 Pages 部署任務在執行，避免並發衝突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # 宣告部署環境為 github-pages，並自動獲取部署後的網址
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SSOT Compiler and Matrix Tests
        run: |
          python SSOT_Compiler.py

      - name: Commit and Push Generated Fixed JS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add URL-Ultimate-Filter-Surge.js
          git commit -m "Auto-build: Update Surge Filter and Generate Pages" || echo "No changes to commit"
          git push

      # 以下為 GitHub Pages 現代化部署的標準流程
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Report Artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # 將 Python 生成的 public 資料夾作為靜態網站的根目錄上傳
          path: './public'

      - name: Deploy Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
