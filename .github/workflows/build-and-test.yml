name: SSOT Compiler Auto Build & Deploy

on:
  push:
    branches: [ main ]
    # 當 Python 編譯腳本有變動時觸發
    paths:
      - 'SSOT_Compiler.py'

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SSOT Compiler and Matrix Tests
        # 執行編譯與測試，若測試失敗（非 0 退出碼），流程會自動在此中斷
        run: |
          python SSOT_Compiler.py

      - name: Commit and Push Generated Fixed JS
        # 【關鍵修改點】：此處需從動態檔名改為固定的 URL-Ultimate-Filter-Surge.js
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 將原本可能是 git add URL-Ultimate-Filter-Surge-V*.js 的指令改為固定檔名
          git add URL-Ultimate-Filter-Surge.js
          
          # 測試報告仍帶有版本號，可使用萬用字元加入
          git add *_SSOT_Report.html
          
          git commit -m "Auto-build: Update Surge Filter and Test Report" || echo "No changes to commit"
          git push
